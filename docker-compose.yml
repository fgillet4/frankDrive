services:
  postgres:
    image: postgres:14-alpine
    container_name: frankdrive-postgres
    environment:
      POSTGRES_DB: frankdrive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: frankdrive_dev_password
    ports:
      - "5433:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frankdrive"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: frankdrive-redis
    command: redis-server --requirepass frankdrive_redis_password
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: frankdrive-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: frankdrive_minio
      MINIO_ROOT_PASSWORD: frankdrive_minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  default:
    name: frankdrive-network
